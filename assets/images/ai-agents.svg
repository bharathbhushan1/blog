<svg viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <filter id="softer" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- figure panel -->
  <rect x="14" y="14" width="1172" height="532" rx="28" fill="#ffffff" stroke="#e5e9f0" stroke-width="1.5" filter="url(#softer)"/>

  <!-- ===================== flows ===================== -->
  <g stroke="#475569" stroke-width="2.6" stroke-linecap="round" marker-start="url(#arw)" marker-end="url(#arw)">
    <line x1="175" y1="150" x2="334" y2="150"/>
    <line x1="184" y1="400" x2="334" y2="400"/>
    <line x1="906" y1="290" x2="1046" y2="290"/>
  </g>
  <text x="254" y="386" text-anchor="middle" font-size="12.5" fill="#64748b" font-weight="600">read / write</text>
  <text x="975" y="276" text-anchor="middle" font-size="12.5" fill="#64748b" font-weight="600">prompt / completion</text>

  <!-- ===================== User ===================== -->
  <g>
    <circle cx="115" cy="150" r="54" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5" filter="url(#soft)"/>
    <circle cx="115" cy="119" r="12" fill="#64748b"/>
    <path d="M97,150 C99,134 131,134 133,150 Z" fill="#64748b"/>
    <text x="115" y="177" text-anchor="middle" dominant-baseline="central" font-size="19" font-weight="700" fill="#334155">User</text>
  </g>

  <!-- ===================== Local state ===================== -->
  <g filter="url(#soft)">
    <path d="M50,320 V475 A65,15 0 0 0 180,475 V320" fill="#dcfce7" stroke="#86efac" stroke-width="2.5"/>
    <ellipse cx="115" cy="320" rx="65" ry="15" fill="#bbf7d0" stroke="#86efac" stroke-width="2.5"/>
  </g>
  <text x="115" y="392" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="700" fill="#166534">Local</text>
  <text x="115" y="414" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="700" fill="#166534">state</text>

  <!-- ===================== LLM cloud ===================== -->
  <g filter="url(#soft)">
    <circle cx="1072" cy="300" r="27" fill="#c4b5fd"/>
    <circle cx="1106" cy="281" r="34" fill="#c4b5fd"/>
    <circle cx="1140" cy="300" r="25" fill="#c4b5fd"/>
    <rect x="1058" y="293" width="90" height="27" rx="13" fill="#c4b5fd"/>
  </g>
  <text x="1105" y="299" text-anchor="middle" dominant-baseline="central" font-size="22" font-weight="800" fill="#4c1d95">LLM</text>

  <!-- ===================== Agent ===================== -->
  <rect x="340" y="60" width="560" height="460" rx="26" fill="#ffffff" stroke="#cbd5e1" stroke-width="2.5" filter="url(#soft)"/>
  <rect x="360" y="44" width="108" height="34" rx="12" fill="#1e293b"/>
  <text x="414" y="61" text-anchor="middle" dominant-baseline="central" font-size="17" font-weight="700" fill="#ffffff" letter-spacing="0.5">Agent</text>

  <!-- Harness group: control loop + instructions -->
  <rect x="365" y="96" width="510" height="150" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="382" y="112" dominant-baseline="central" font-size="12.5" font-weight="700" fill="#475569" letter-spacing="0.6">HARNESS</text>
  <rect x="377" y="124" width="486" height="46" rx="11" fill="#ede9fe" stroke="#c4b5fd" stroke-width="2"/>
  <text x="620" y="147" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="700" fill="#5b21b6">Control loop</text>
  <g font-size="16" font-weight="600" fill="#1d4ed8" text-anchor="middle">
    <rect x="377" y="182" width="155" height="50" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="454" y="207" dominant-baseline="central">System prompt</text>
    <rect x="542" y="182" width="155" height="50" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="619" y="207" dominant-baseline="central">Prompts</text>
    <rect x="707" y="182" width="156" height="50" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="785" y="207" dominant-baseline="central">Skills</text>
  </g>

  <!-- Memory (between harness and tools) -->
  <rect x="365" y="262" width="510" height="44" rx="12" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="620" y="284" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="700" fill="#166534">Memory</text>

  <!-- Tools & execution group -->
  <rect x="365" y="322" width="510" height="166" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="382" y="338" dominant-baseline="central" font-size="12.5" font-weight="700" fill="#475569" letter-spacing="0.6">TOOLS · EXECUTION</text>
  <g font-size="16" font-weight="600" fill="#92400e" text-anchor="middle">
    <rect x="377" y="352" width="237" height="50" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="495" y="377" dominant-baseline="central">Code sandbox</text>
    <rect x="626" y="352" width="237" height="50" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="744" y="377" dominant-baseline="central">Builtin tools</text>
    <rect x="377" y="416" width="237" height="50" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="495" y="441" dominant-baseline="central">MCP client</text>
    <rect x="626" y="416" width="237" height="50" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="744" y="441" dominant-baseline="central">Local MCP servers</text>
  </g>
</svg>
