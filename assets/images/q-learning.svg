<svg viewBox="0 0 760 210" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- figure panel -->
  <rect x="10" y="10" width="740" height="190" rx="22" fill="#ffffff" stroke="#e5e9f0" stroke-width="1.5" filter="url(#soft)"/>

  <!-- learned policy: always move right toward the goal -->
  <g stroke="#475569" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arw)">
    <line x1="108" y1="62" x2="153" y2="62"/>
    <line x1="218" y1="62" x2="263" y2="62"/>
    <line x1="328" y1="62" x2="373" y2="62"/>
    <line x1="438" y1="62" x2="483" y2="62"/>
    <line x1="548" y1="62" x2="593" y2="62"/>
  </g>

  <!-- start marker -->
  <text x="74" y="62" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="700" fill="#64748b">start</text>

  <!-- cells 0..4 -->
  <g font-size="22" font-weight="700" fill="#1d4ed8" text-anchor="middle">
    <rect x="40" y="76" width="68" height="68" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
    <text x="74" y="111" dominant-baseline="central">0</text>
    <rect x="150" y="76" width="68" height="68" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
    <text x="184" y="111" dominant-baseline="central">1</text>
    <rect x="260" y="76" width="68" height="68" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
    <text x="294" y="111" dominant-baseline="central">2</text>
    <rect x="370" y="76" width="68" height="68" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
    <text x="404" y="111" dominant-baseline="central">3</text>
    <rect x="480" y="76" width="68" height="68" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
    <text x="514" y="111" dominant-baseline="central">4</text>
  </g>

  <!-- goal cell 5 -->
  <rect x="590" y="76" width="68" height="68" rx="12" fill="#dcfce7" stroke="#86efac" stroke-width="2.5"/>
  <text x="624" y="106" text-anchor="middle" dominant-baseline="central" font-size="22" font-weight="700" fill="#166534">5</text>
  <text x="624" y="130" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#166534" letter-spacing="0.5">GOAL +1</text>

  <!-- learned right-action values, discounted back from the goal -->
  <g font-size="13" font-weight="600" fill="#92400e" text-anchor="middle">
    <text x="74" y="166" dominant-baseline="central">0.66</text>
    <text x="184" y="166" dominant-baseline="central">0.73</text>
    <text x="294" y="166" dominant-baseline="central">0.81</text>
    <text x="404" y="166" dominant-baseline="central">0.90</text>
    <text x="514" y="166" dominant-baseline="central">1.00</text>
  </g>
  <text x="380" y="188" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#64748b" font-weight="600">Q(s, right) — discounted by gamma each step from the goal</text>
</svg>
